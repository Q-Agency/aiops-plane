<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="786" viewBox="0 0 1280 786" role="img">
<title>Agentifying the SDLC workflow</title>
<desc>The spec-first SDLC workflow is a fixed sequence of steps and artifacts. Each step is normally run as a skill inside the Cursor or Claude Code IDE. One by one, each step's skill is replaced by an autonomous agent - the BA agent already runs the spec step, the SA agent the design step, the Dev agent implementation - until every step is agent-filled, implementation and code review run on headless Claude Code, and no work happens in the IDE.</desc>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
.title{font-size:27px;font-weight:700;fill:#1c2230;}
.sub{font-size:15px;fill:#5a6376;}
.band{font-size:13px;font-weight:600;fill:#8a93a6;}
.step{font-size:15px;font-weight:600;fill:#1c2230;}
.art{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:12px;fill:#5a6376;}
.exec{font-size:13px;font-weight:600;}
.tag{font-size:11.5px;}
.cap{font-size:13px;fill:#5a6376;}
.lbl{font-size:13px;font-weight:600;fill:#1c2230;}
.mut{fill:#8a93a6;}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="title" x="48" y="58">Agentifying the SDLC workflow</text>
<text class="sub" x="48" y="86">Each step's skill becomes an autonomous agent - until no work happens in the IDE</text>

<rect x="1000" y="43" width="12" height="12" rx="3" fill="#e6f3ee" stroke="#0c6b58" stroke-width="0.75"/>
<text class="tag" x="1018" y="53" fill="#5a6376">agent · live</text>
<rect x="1000" y="63" width="12" height="12" rx="3" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.75"/>
<text class="tag" x="1018" y="73" fill="#5a6376">agent · done / near</text>
<rect x="1000" y="83" width="12" height="12" rx="3" fill="#f1efe8" stroke="#c9c7bd" stroke-width="0.75"/>
<text class="tag" x="1018" y="93" fill="#5a6376">skill in IDE → to agentify</text>

<text class="band" x="48" y="140">the workflow - a fixed sequence of steps + artifacts; each step's executor migrates skill → agent</text>

<line x1="199" y1="200" x2="216" y2="200" stroke="#aab2c0" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="369" y1="200" x2="386" y2="200" stroke="#aab2c0" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="539" y1="200" x2="556" y2="200" stroke="#aab2c0" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="709" y1="200" x2="726" y2="200" stroke="#aab2c0" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="879" y1="200" x2="896" y2="200" stroke="#aab2c0" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="1049" y1="200" x2="1066" y2="200" stroke="#aab2c0" stroke-width="1.2" marker-end="url(#arrow)"/>

<rect x="48" y="158" width="150" height="120" rx="10" fill="#ffffff" stroke="#dde2ec" stroke-width="0.75"/>
<text class="step" x="123" y="182" text-anchor="middle">constitution</text>
<text class="art" x="123" y="202" text-anchor="middle">CONSTITUTION.md</text>
<line x1="60" y1="214" x2="186" y2="214" stroke="#eef1f6" stroke-width="1"/>
<rect x="58" y="222" width="130" height="48" rx="7" fill="#f1efe8" stroke="#c9c7bd" stroke-width="0.75"/>
<text class="exec" x="123" y="243" text-anchor="middle" fill="#5f5e5a">skill</text>
<text class="tag" x="123" y="260" text-anchor="middle" fill="#807e74">in IDE</text>

<rect x="218" y="158" width="150" height="120" rx="10" fill="#ffffff" stroke="#dde2ec" stroke-width="0.75"/>
<text class="step" x="293" y="182" text-anchor="middle">spec</text>
<text class="art" x="293" y="202" text-anchor="middle">SPEC.md</text>
